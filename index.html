<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxForLife</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS embedded for maximum reliability */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #1a153a 0%, #050505 60%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 30px 30px; }
        .profile-card { background: rgba(15, 15, 20, 0.6); backdrop-filter: blur(25px); padding: 50px; border-radius: 24px; text-align: center; width: 600px; max-width: 100%; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); }
        .pfp-wrapper { position: relative; display: inline-block; margin-bottom: 15px; }
        .avatar { width: 130px; height: 130px; border-radius: 50%; border: 4px solid #1a1a24; object-fit: cover; }
        .status-dot { position: absolute; bottom: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background-color: #80848e; border: 5px solid #1a1a24; }
        h1 { font-size: 38px; font-weight: 800; margin-bottom: 10px; }
        .custom-status { background: rgba(0, 0, 0, 0.4); padding: 8px 16px; border-radius: 20px; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
        .python-banner { background: linear-gradient(90deg, rgba(55, 118, 171, 0.2), rgba(255, 211, 67, 0.1)); border: 1px solid rgba(55, 118, 171, 0.3); padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 700; margin-bottom: 25px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 18px; color: #fff; text-decoration: none; border-radius: 14px; font-weight: 600; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(255, 255, 255, 0.03); margin-bottom: 15px; }
        .btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-3px); }
        .animate-pop { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="profile-card animate-pop">
        <div class="pfp-wrapper">
            <img src="blox.jpg" alt="Profile" class="avatar" id="discord-pfp">
            <div class="status-dot" id="discord-status"></div>
        </div>
        <h1>BloxForLife</h1>
        <div class="custom-status" id="custom-status-badge" style="display: none;">
            <span id="custom-status-emoji"></span>
            <span id="custom-status-text"></span>
        </div>
        <div class="python-banner">
            <i class="fa-brands fa-python" style="color: #FFD343;"></i>
            <span>Python Developer</span>
        </div>
        <div class="links">
            <a href="https://discord.com/users/1075335630353080340" target="_blank" class="btn"><i class="fa-brands fa-discord"></i> Discord</a>
            <a href="https://www.roblox.com/users/4548670369/profile" target="_blank" class="btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Roblox_logo.png" style="width:20px; height:20px; filter: invert(1); margin-right: 5px;"> Roblox
            </a>
            <a href="https://github.com/BloxForLife" target="_blank" class="btn"><i class="fa-brands fa-github"></i> GitHub</a>
        </div>
    </div>

    <script>
        const discordId = '1075335630353080340';
        fetch(`https://api.lanyard.rest/v1/users/${discordId}`)
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const lData = data.data;
                    document.getElementById('discord-pfp').src = `https://cdn.discordapp.com/avatars/${discordId}/${lData.discord_user.avatar}.png?size=512`;
                    const colors = { online: '#23a559', idle: '#f0b232', dnd: '#f23f42', offline: '#80848e' };
                    document.getElementById('discord-status').style.backgroundColor = colors[lData.discord_status] || colors.offline;
                    const customAct = lData.activities.find(act => act.type === 4);
                    if (customAct && customAct.state) {
                        document.getElementById('custom-status-text').innerText = customAct.state;
                        document.getElementById('custom-status-badge').style.display = 'inline-flex';
                    }
                }
            });
    </script>
</body>
</html>
