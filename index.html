<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxForLife</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="profile-card animate-pop">
        <div class="pfp-wrapper">
            <img src="blox.jpg" alt="Profile" class="avatar" id="discord-pfp">
            <div class="status-dot" id="discord-status"></div>
        </div>
        <h1>BloxForLife</h1>
        <div class="custom-status" id="custom-status-badge" style="display: none;">
            <span id="custom-status-emoji"></span>
            <span id="custom-status-text"></span>
        </div>
        <div class="python-banner">
            <i class="fa-brands fa-python" style="color: #FFD343;"></i>
            <span>Python Developer</span>
        </div>
        <div class="links">
            <a href="https://discord.com/users/1075335630353080340" target="_blank" class="btn"><i class="fa-brands fa-discord"></i> Discord</a>
            <a href="https://www.roblox.com/users/4548670369/profile" target="_blank" class="btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Roblox_logo.png" style="width:20px; height:20px; filter: invert(1); margin-right: 5px;"> Roblox
            </a>
            <a href="https://github.com/BloxForLife" target="_blank" class="btn"><i class="fa-brands fa-github"></i> GitHub</a>
        </div>
    </div>
    <script>
        const discordId = '1075335630353080340';
        fetch(`https://api.lanyard.rest/v1/users/${discordId}`)
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const lData = data.data;
                    document.getElementById('discord-pfp').src = `https://cdn.discordapp.com/avatars/${discordId}/${lData.discord_user.avatar}.png?size=512`;
                    const colors = { online: '#23a559', idle: '#f0b232', dnd: '#f23f42', offline: '#80848e' };
                    document.getElementById('discord-status').style.backgroundColor = colors[lData.discord_status] || colors.offline;
                    const customAct = lData.activities.find(act => act.type === 4);
                    if (customAct && customAct.state) {
                        document.getElementById('custom-status-text').innerText = customAct.state;
                        document.getElementById('custom-status-badge').style.display = 'inline-flex';
                    }
                }
            });
    </script>
</body>
</html>
